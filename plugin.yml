package it.lumapvp.lobby.managers;
import it.lumapvp.lobby.LumaPvPLobby;
import org.bukkit.entity.Player;
import java.io.ByteArrayInputStream;
import java.io.ByteArrayOutputStream;
import java.io.DataInputStream;
import java.io.DataOutputStream;
public class ProxyManager {
    private final LumaPvPLobby plugin;
    private int onlinePlayers = 0;
    public ProxyManager(LumaPvPLobby plugin) {
        this.plugin = plugin;
    }
    public void requestOnlinePlayers(Player player) {
        try {
            ByteArrayOutputStream bout = new ByteArrayOutputStream();
            DataOutputStream out = new DataOutputStream(bout);
            out.writeUTF("PlayerCount");
            out.writeUTF("ALL");
            player.sendPluginMessage(plugin, "BungeeCord", bout.toByteArray());
        } catch (Exception e) {
            plugin.getLogger().warning("Cannot request proxy player count: " + e.getMessage());
        }
    }
    public void connectToServer(Player player, String server) {
        try {
            ByteArrayOutputStream bout = new ByteArrayOutputStream();
            DataOutputStream out = new DataOutputStream(bout);
            out.writeUTF("Connect");
            out.writeUTF(server);
            player.sendPluginMessage(plugin, "BungeeCord", bout.toByteArray());
        } catch (Exception e) {
            plugin.getLogger().warning("Cannot connect to server: " + e.getMessage());
        }
    }
    public void handleMessage(Player player, byte[] data) {
        try {
            DataInputStream in = new DataInputStream(new ByteArrayInputStream(data));
            String subChannel = in.readUTF();
            if (subChannel.equals("PlayerCount")) {
                in.readUTF(); 
                onlinePlayers = in.readInt();
            }
        } catch (Exception e) {
        }
    }
    public int getOnlinePlayers() {
        return onlinePlayers;
    }
}
